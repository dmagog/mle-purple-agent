<svg viewBox="0 0 680 308" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="ag" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#639922"/></marker>
    <marker id="ap" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#534AB7"/></marker>
    <marker id="ad" markerWidth="8" markerHeight="8" refX="5.5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#9990E0"/></marker>
  </defs>

  <!-- Green agent -->
  <rect x="30" y="86" width="196" height="104" rx="14" fill="#EAF3DE" stroke="#639922" stroke-width="2"/>
  <text x="128" y="130" text-anchor="middle" font-size="20" font-weight="500" fill="#27500A">Green agent</text>
  <text x="128" y="156" text-anchor="middle" font-size="13" fill="#3B6D11">sets and scores the task</text>

  <!-- Purple agent -->
  <rect x="388" y="44" width="262" height="200" rx="14" fill="#EEEDFE" stroke="#7F77DD" stroke-width="2"/>
  <text x="519" y="78" text-anchor="middle" font-size="20" font-weight="500" fill="#3C3489">Purple agent (ours)</text>
  <text x="519" y="100" text-anchor="middle" font-size="13" fill="#534AB7">solves it autonomously</text>

  <rect x="408" y="114" width="222" height="34" rx="8" fill="#FFFFFF" stroke="#CECBF6" stroke-width="1.3"/>
  <text x="519" y="136" text-anchor="middle" font-size="13" fill="#3C3489">detect the competition</text>
  <rect x="408" y="158" width="222" height="34" rx="8" fill="#FFFFFF" stroke="#CECBF6" stroke-width="1.3"/>
  <text x="519" y="180" text-anchor="middle" font-size="13" fill="#3C3489">run the solver or LLM loop</text>
  <rect x="408" y="202" width="222" height="34" rx="8" fill="#FFFFFF" stroke="#CECBF6" stroke-width="1.3"/>
  <text x="519" y="224" text-anchor="middle" font-size="13" fill="#3C3489">return submission.csv</text>
  <line x1="519" y1="149" x2="519" y2="156" stroke="#7F77DD" stroke-width="1.4" marker-end="url(#ad)"/>
  <line x1="519" y1="193" x2="519" y2="200" stroke="#7F77DD" stroke-width="1.4" marker-end="url(#ad)"/>

  <!-- A2A connectors -->
  <line x1="228" y1="116" x2="384" y2="116" stroke="#639922" stroke-width="2.4" marker-end="url(#ag)"/>
  <text x="306" y="107" text-anchor="middle" font-size="12" fill="#5F5E5A">task (.tar.gz)</text>
  <line x1="384" y1="162" x2="228" y2="162" stroke="#534AB7" stroke-width="2.4" marker-end="url(#ap)"/>
  <text x="306" y="183" text-anchor="middle" font-size="12" fill="#5F5E5A">submission.csv</text>
  <rect x="282" y="128" width="48" height="22" rx="11" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="1"/>
  <text x="306" y="143" text-anchor="middle" font-size="12" font-weight="500" fill="#444441">A2A</text>

  <!-- no human in the loop (accent tagline, deliberately not a pill) -->
  <text x="340" y="289" text-anchor="middle" font-size="17" font-weight="500" letter-spacing="0.4" fill="#1F1F1E">no human in the loop</text>
</svg>
